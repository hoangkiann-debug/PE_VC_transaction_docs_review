interface:
  display_name: "PE/VC私募交易文件审阅"
  short_description: "审阅人民币及美元融资文件，核验红线、跨文件冲突与市场采用比例"
  default_prompt: "请使用 $pe-vc-transaction-docs-review 审阅这套未上市公司股权融资交易文件：先识别人民币或红筹/VIE美元架构、审阅立场、文件版本和跨文件冲突，再结合历史市场数据与现行法律依据，输出完整修改建议、修订后版本、主要问题清单及必要的main control list。"
policy:
  allow_implicit_invocation: true
